        .container h1 {
            text-align: center;
            color: #1100ff;
            letter-spacing: 4px;
            text-shadow: 0 3px 8px rgba(0, 0, 0, 0.2);
        }

        .container {
            max-width: 400px;
            padding: 20px;
            background-color: #ffffff;
            border: none;
            border-radius: 10px;
            font-family: 'Poppins', sans-serif;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
            transition: 0.3s;
        }

        .container:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.25);
        }

        p {
            text-align: center;
            margin-top: 15px;
        }

        a {
            text-decoration: none;
            font-weight: 500;
        }

        a:hover {
            text-decoration: underline;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"] {
            color: rgb(0, 0, 0);
            font-size: 16px;
            width: 100%;
            padding: 10px;
            margin: 20px 0;
            border: none;
            border-bottom: 3px solid black;
            outline: none;
            box-sizing: border-box;
        }

        input[type="text"]:focus,
        input[type="email"]:focus,
        input[type="password"]:focus {
            border-bottom: 3px solid #000000;
            box-shadow: 0 0 5px rgba(0, 0, 0, 0.5);
        }

        input:hover {
            box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease-in-out;
        }

        select {
            width: 100%;
            padding: 10px;
            margin: 20px 0;
            border: 3px solid black;
            border-radius: 5px;
            box-sizing: border-box;
        }

        input[type="submit"] {
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            color: white;
            padding: 12px;
            width: 100%;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, #1100ff, #5f5bff);
            transition: 0.3s;
        }

        input[type="submit"]:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }
    </style>
    <script>
        const SERVER_URL = "https://registration-system-9eno.onrender.com";

        async function signup(event) {
            event.preventDefault();
            try {
                const userData = {
                    username: document.getElementById("username").value,
                    email: document.getElementById("email").value,
                    password: document.getElementById("password").value
                };

                const response = await fetch(`${SERVER_URL}/api/register`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(userData)
                });

                const result = await response.text();
                alert(result);
                alert("Successfully Register")

            } catch (error) {
                console.error("Error:", error);
                alert("Something went wrong!");
            }
        }
    </script>
</head>

<body>
    <div class="container">
        <h1>Sign Up</h1>
        <form onsubmit="signup(event)">
            <!-- <div class="input-group">
    <input type="text" required>
    <label>👤 Username</label>
</div> -->

            <input type="text" id="username" placeholder="👤 Username">
            <input type="email" id="email" placeholder="📧 Email">
            <input type="password" id="password" minlength="6" placeholder="🔒 Password">
            <input type="submit" value="Signup">
        </form>
        <p>If you already have an account :<a href="#">Login</a></p>
    </div>
